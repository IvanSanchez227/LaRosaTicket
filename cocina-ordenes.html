<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📱 Tomar Orden</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--card:#1c1c1c;--card2:#242424;--border:#333;
  --red:#e63030;--red-dark:#b02020;--green:#2ecc71;--yellow:#f1c40f;
  --orange:#e67e22;--text:#f5f5f5;--muted:#777;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

header{background:var(--red);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(0,0,0,.5);}
header h1{font-family:'Teko',sans-serif;font-size:1.7rem;font-weight:700;letter-spacing:2px;line-height:1;}
#num-display{font-family:'Teko',sans-serif;font-size:1.3rem;background:rgba(0,0,0,.35);padding:3px 10px;border-radius:4px;letter-spacing:1px;}
#sync-status{font-size:.68rem;padding:2px 7px;border-radius:3px;background:rgba(0,0,0,.3);}

nav{display:flex;background:#161616;border-bottom:2px solid var(--border);}
.nav-btn{flex:1;padding:10px 6px;background:none;border:none;color:var(--muted);font-family:'Teko',sans-serif;font-size:1rem;letter-spacing:1px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.nav-btn.active{color:var(--text);border-bottom-color:var(--red);}
.badge{background:var(--red);color:#fff;border-radius:999px;font-size:.62rem;font-weight:600;padding:1px 5px;line-height:1.4;}

.view{display:none;}
#view-nueva{display:none;flex-direction:column;height:calc(100vh - 93px);}
#view-nueva.active{display:flex;}
#view-sent{display:none;padding:12px;overflow-y:auto;height:calc(100vh - 93px);}
#view-sent.active{display:block;}

.nueva-body{display:flex;flex:1;overflow:hidden;}

/* MENU */
.menu-panel{width:52%;border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-title{font-family:'Teko',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--muted);padding:8px 10px 5px;border-bottom:1px solid var(--border);background:var(--card);}
.menu-scroll{flex:1;overflow-y:auto;}
.cat-section{margin-bottom:1px;}
.cat-header{background:#1e1e1e;padding:6px 10px;font-family:'Teko',sans-serif;font-size:.92rem;letter-spacing:1px;color:var(--yellow);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cat-price{font-size:.75rem;color:var(--green);font-family:'Noto Sans',sans-serif;font-weight:600;}
.cat-items{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:5px;}
.menu-btn{background:var(--card2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Noto Sans',sans-serif;font-size:.68rem;font-weight:500;padding:8px 5px;cursor:pointer;text-align:center;line-height:1.2;min-height:40px;display:flex;align-items:center;justify-content:center;transition:background .1s,transform .08s;user-select:none;}
.menu-btn:active{transform:scale(.93);background:var(--red);border-color:var(--red);}
.menu-btn.needs-meat{border-left:3px solid var(--orange);}
.menu-btn.full-w{grid-column:span 2;}

/* ORDER */
.order-panel{width:48%;display:flex;flex-direction:column;overflow:hidden;}
.order-top{padding:7px 10px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.order-top span{font-family:'Teko',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--muted);}
.order-top strong{font-family:'Teko',sans-serif;font-size:1.2rem;color:var(--yellow);}
.order-items{flex:1;overflow-y:auto;padding:7px;}
.empty-msg{text-align:center;color:var(--muted);padding:24px 8px;font-size:.78rem;line-height:1.8;}
.order-item{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:6px 7px;margin-bottom:5px;animation:slideIn .15s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(8px);}to{opacity:1;transform:translateX(0);}}
.item-row{display:flex;align-items:center;gap:5px;}
.item-name{flex:1;font-size:.7rem;font-weight:600;line-height:1.2;}
.qty-row{display:flex;align-items:center;gap:3px;}
.qbtn{width:22px;height:22px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:3px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:var(--red);}
.qty-num{font-family:'Teko',sans-serif;font-size:.95rem;min-width:16px;text-align:center;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:1px 3px;}
.del-btn:active{color:var(--red);}
.meat-tag{font-size:.63rem;background:rgba(230,126,34,.15);border:1px solid var(--orange);color:var(--orange);border-radius:3px;padding:1px 4px;margin-top:3px;display:inline-block;}

.notes-row{padding:5px 7px;border-top:1px solid var(--border);}
.notes-row textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Noto Sans',sans-serif;font-size:.7rem;padding:5px;resize:none;height:46px;}
.notes-row textarea::placeholder{color:var(--muted);}
.notes-row textarea:focus{outline:1px solid var(--red);}
.action-row{padding:7px;display:flex;gap:5px;border-top:1px solid var(--border);}
.btn-enviar{flex:1;background:var(--red);color:#fff;border:none;border-radius:5px;padding:11px;font-family:'Teko',sans-serif;font-size:1.15rem;letter-spacing:1px;cursor:pointer;}
.btn-enviar:active{background:var(--red-dark);}
.btn-limpiar{background:var(--card2);color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:11px 12px;font-size:.75rem;cursor:pointer;}

/* SENT */
.sent-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sent-header h2{font-family:'Teko',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--muted);}
.btn-clear-sent{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:4px;cursor:pointer;font-size:.73rem;}
.sent-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:8px;}
.sent-card.listo{border-color:var(--green);opacity:.55;}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.sc-num{font-family:'Teko',sans-serif;font-size:1.3rem;color:var(--yellow);}
.sc-time{font-size:.72rem;color:var(--muted);}
.sc-line{font-size:.78rem;padding:3px 0;border-bottom:1px dashed var(--border);display:flex;gap:8px;}
.sc-line:last-child{border:none;}
.sc-qty{font-family:'Teko',sans-serif;color:var(--red);min-width:22px;}
.sc-meat{font-size:.68rem;color:var(--orange);}
.sc-status{font-size:.68rem;margin-top:5px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:2px solid var(--border);border-radius:10px;width:92%;max-width:380px;overflow:hidden;}
.modal-head{background:var(--orange);padding:11px 14px;}
.modal-head h3{font-family:'Teko',sans-serif;font-size:1.4rem;letter-spacing:1px;}
.modal-head p{font-size:.74rem;opacity:.85;margin-top:1px;}
.modal-body{padding:9px;display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:52vh;overflow-y:auto;}
.meat-opt-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:10px 7px;font-family:'Noto Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.meat-opt-btn:active{background:var(--orange);border-color:var(--orange);}
.meat-extra{font-size:.63rem;color:var(--green);font-weight:600;}
.modal-foot{padding:9px 11px;border-top:1px solid var(--border);display:flex;gap:7px;}
.btn-sin-carne{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:8px;font-size:.74rem;cursor:pointer;}
.btn-cancelar-modal{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:8px 12px;font-size:.74rem;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#222;border:1px solid var(--green);color:var(--green);border-radius:6px;padding:8px 18px;font-size:.82rem;font-weight:600;z-index:300;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div>
    <h1>🌹 LA ROSA</h1>

</div>

<!-- MEAT MODAL -->
<div class="modal-overlay" id="meat-modal">

    <div class="modal-head">
      <h3 id="modal-title">¿Qué carne?</h3>
      <p id="modal-sub">Selecciona el tipo de carne</p>
    </div>
    <div class="modal-body" id="meat-options"></div>
    <div class="modal-foot">
      <button class="btn-sin-carne" onclick="elegirCarne(null)">Sin especificar</button>
      <button class="btn-cancelar-modal" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  MENU DATA
// ══════════════════════════════════════════════════
var CATEGORIAS = [
  {

    ],
    items:[

    ]

      {name:"Chicharron en Salsa"},

    items:[

  {
    label:"TORTAS", price:"$12.99",
    carnes:[
      {name:"Asada"},{name:"Barbacoa"},{name:"Adobada"},{name:"Pollo"},

      {name:"Lengua",extra:"→ $16.99"},{name:"Tripa",extra:"→ $16.99"},

    ],

  },
  {
    label:"PLATILLOS", price:"varios precios", carnes:null,
    items:[
      {name:"Carne Asada $14.99",needsMeat:false},
      {name:"Pollo Plancha $13.99",needsMeat:false},
      {name:"Costilla Asada $16.99",needsMeat:false},
      {name:"Mojarra $14.99",needsMeat:false},
      {name:"Milanesa Pollo/Res $14.99",needsMeat:false},
      {name:"Bistec Ranchero $14.99",needsMeat:false},
      {name:"Huevos Rancheros $11.99",needsMeat:false},
      {name:"Nopales con Huevo $12.99",needsMeat:false},
      {name:"Mole $13.99",needsMeat:false},
      {name:"Chile Relleno $12.99",needsMeat:false},

  },
  {

    ]
  },
  {

    items:[
      {name:"Arroz",needsMeat:false},{name:"Frijoles",needsMeat:false},
      {name:"Ensalada",needsMeat:false},{name:"Nachos",needsMeat:false},
      {name:"Nopales en vinagre",needsMeat:false},
      {name:"Side papas fritas",needsMeat:false},
      {name:"Side platano frito",needsMeat:false},
      {name:"Orden tortilla",needsMeat:false},
      {name:"Orden cebolla/cilantro",needsMeat:false},
      {name:"Salsa roja",needsMeat:false},{name:"Salsa verde",needsMeat:false},
      {name:"Atole/arroz con leche",needsMeat:false},
      {name:"Dulce preparado",needsMeat:false},
      {name:"Consome de res",needsMeat:false},
      {name:"Vaso costilla verde/roja",needsMeat:false},
      {name:"Tripa cocinada",needsMeat:false},

      {name:"Carne cocinada",needsMeat:false}
    ]
  }
];

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
var ordenActual = [];
var numOrden = 1;
var sentOrders = [];
var pendingItem = null;
var fbPush = null; // will be set if Firebase is configured

// ══════════════════════════════════════════════════
//  BUILD MENU
// ══════════════════════════════════════════════════
(function buildMenu() {
  var scroll = document.getElementById('menu-scroll');
  CATEGORIAS.forEach(function(cat) {
    var sec = document.createElement('div');
    sec.className = 'cat-section';

    var hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.innerHTML = cat.label + (cat.price ? '<span class="cat-price">'+cat.price+'</span>' : '');
    sec.appendChild(hdr);

    var grid = document.createElement('div');
    grid.className = 'cat-items';

    cat.items.forEach(function(item) {
      var btn = document.createElement('button');
      var classes = 'menu-btn';
      if (item.needsMeat) classes += ' needs-meat';
      if (cat.items.length === 1) classes += ' full-w';
      btn.className = classes;
      btn.textContent = item.name;

      // capture variables for closure
      (function(itemName, needsMeat, carnes, catLabel) {
        btn.onclick = function() {
          if (needsMeat && carnes) {
            abrirModal(itemName, carnes, catLabel);
          } else {
            agregarItem(itemName, null);
          }
        };
      })(item.name, item.needsMeat, cat.carnes, cat.label);

      grid.appendChild(btn);
    });

    sec.appendChild(grid);
    scroll.appendChild(sec);
  });
})();

// ══════════════════════════════════════════════════
//  ORDER LOGIC
// ══════════════════════════════════════════════════
function agregarItem(nombre, carne) {
  var ex = null;
  for (var i = 0; i < ordenActual.length; i++) {
    if (ordenActual[i].nombre === nombre && ordenActual[i].carne === carne) {
      ex = ordenActual[i]; break;
    }
  }
  if (ex) ex.qty++;
  else ordenActual.push({nombre:nombre, carne:carne, qty:1});
  renderOrden();
}

function renderOrden() {
  var el = document.getElementById('order-items');
  if (!ordenActual.length) {
    el.innerHTML = '<div class="empty-msg">👈 Toca un platillo<br>para agregarlo</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < ordenActual.length; i++) {
    var item = ordenActual[i];
    html += '<div class="order-item">' +
      '<div class="item-row">' +
        '<div class="item-name">' + item.nombre + '</div>' +
        '<div class="qty-row">' +
          '<button class="qbtn" onclick="cambiarQty('+i+',-1)">−</button>' +
          '<span class="qty-num">' + item.qty + '</span>' +
          '<button class="qbtn" onclick="cambiarQty('+i+',1)">+</button>' +
        '</div>' +
        '<button class="del-btn" onclick="eliminarItem('+i+')">✕</button>' +
      '</div>' +
      (item.carne ? '<span class="meat-tag">🥩 ' + item.carne + '</span>' : '') +
    '</div>';
  }
  el.innerHTML = html;
}

function cambiarQty(i, d) {
  ordenActual[i].qty += d;
  if (ordenActual[i].qty <= 0) ordenActual.splice(i, 1);
  renderOrden();
}
function eliminarItem(i) { ordenActual.splice(i, 1); renderOrden(); }
function limpiarOrden() { ordenActual = []; document.getElementById('notas').value = ''; renderOrden(); }

function enviarOrden() {
  if (!ordenActual.length) { alert('Agrega platillos primero.'); return; }
  var notas = document.getElementById('notas').value.trim();
  var num = String(numOrden).padStart(3,'0');
  var now = new Date();
  var orden = {
    num: '#'+num,
    numInt: numOrden,
    items: JSON.parse(JSON.stringify(ordenActual)),
    notas: notas,
    hora: now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}),
    timestamp: now.getTime(),
    listo: false
  };

  // Try Firebase if configured
  if (fbPush) {
    try {
      fbPush(orden, function(err, key) {
        if (err) {
          setSyncStatus('⚠️ Error', '#e74c3c');
        } else {
          orden.fbKey = key;
          setSyncStatus('🟢 Enviado', '#2ecc71');
        }
      });
    } catch(e) {
      setSyncStatus('⚠️ Sin Firebase', '#e67e22');
    }
  }

  sentOrders.unshift(JSON.parse(JSON.stringify(orden)));
  numOrden++;
  var n = '#'+String(numOrden).padStart(3,'0');
  document.getElementById('num-display').textContent = 'ORDEN '+n;
  document.getElementById('cur-num').textContent = n;
  limpiarOrden();
  actualizarBadge();
  renderSent();
  showToast('✅ Orden #' + orden.num + ' enviada');
  showTab('sent');
}

function renderSent() {
  var el = document.getElementById('sent-list');
  if (!sentOrders.length) {
    el.innerHTML = '<div class="empty-msg">No hay órdenes enviadas aún</div>';
    return;
  }
  var html = '';
  sentOrders.forEach(function(o) {
    html += '<div class="sent-card' + (o.listo?' listo':'') + '">' +
      '<div class="sc-head"><span class="sc-num">'+o.num+'</span><span class="sc-time">'+o.hora+'</span></div>';
    o.items.forEach(function(it) {
      html += '<div class="sc-line"><span class="sc-qty">'+it.qty+'×</span><span>'+it.nombre+
        (it.carne ? ' <span class="sc-meat">— 🥩'+it.carne+'</span>' : '')+'</span></div>';
    });
    if (o.notas) html += '<div style="font-size:.7rem;color:var(--yellow);margin-top:5px;">📝 '+o.notas+'</div>';
    html += '<div class="sc-status" style="color:'+(o.listo?'var(--green)':'var(--muted)')+'">'+
      (o.listo ? '✓ LISTA' : '⏳ En espera...')+'</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function clearListas() {
  sentOrders = sentOrders.filter(function(o){return !o.listo;});
  actualizarBadge(); renderSent();
}
function actualizarBadge() {
  var n = sentOrders.filter(function(o){return !o.listo;}).length;
  document.getElementById('badge').textContent = n;
}

// ══════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════
function abrirModal(itemName, carnes, catLabel) {
  pendingItem = {nombre: itemName};
  document.getElementById('modal-title').textContent = itemName;
  document.getElementById('modal-sub').textContent = catLabel + ' — ¿Qué tipo de carne?';
  var html = '';
  carnes.forEach(function(c) {
    html += '<button class="meat-opt-btn" onclick="elegirCarne(\'' + c.name.replace(/'/g,"\\'") + '\')">' +
      c.name + (c.extra ? '<span class="meat-extra">'+c.extra+'</span>' : '') + '</button>';
  });
  document.getElementById('meat-options').innerHTML = html;
  document.getElementById('meat-modal').classList.add('open');
}
function elegirCarne(carne) {
  if (pendingItem) agregarItem(pendingItem.nombre, carne);
  cerrarModal();
}
function cerrarModal() {
  document.getElementById('meat-modal').classList.remove('open');
  pendingItem = null;
}
document.getElementById('meat-modal').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});

// ══════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════
function showTab(tab) {
  var nueva = document.getElementById('view-nueva');
  var sent = document.getElementById('view-sent');
  var tNueva = document.getElementById('tab-nueva');
  var tSent = document.getElementById('tab-sent');
  if (tab === 'nueva') {
    nueva.style.display = 'flex'; sent.style.display = 'none';
    tNueva.classList.add('active'); tSent.classList.remove('active');
  } else {
    nueva.style.display = 'none'; sent.style.display = 'block';
    tNueva.classList.remove('active'); tSent.classList.add('active');
    renderSent();
  }
}

// ══════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}
function setSyncStatus(msg, color) {
  var el = document.getElementById('sync-status');
  el.textContent = msg; el.style.color = color;
}
