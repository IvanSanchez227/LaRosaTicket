<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📱 La Rosa — Tomar Orden</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--card:#1c1c1c;--card2:#242424;--border:#333;
  --red:#e63030;--red-dark:#b02020;--green:#2ecc71;--yellow:#f1c40f;
  --orange:#e67e22;--blue:#3498db;--text:#f5f5f5;--muted:#777;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

header{background:var(--red);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(0,0,0,.5);}
header h1{font-family:'Teko',sans-serif;font-size:1.7rem;font-weight:700;letter-spacing:2px;line-height:1;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
#num-display{font-family:'Teko',sans-serif;font-size:1.2rem;background:rgba(0,0,0,.35);padding:3px 10px;border-radius:4px;letter-spacing:1px;}
#sync-status{font-size:.62rem;color:rgba(255,255,255,.65);}

nav{display:flex;background:#161616;border-bottom:2px solid var(--border);}
.nav-btn{flex:1;padding:10px 6px;background:none;border:none;color:var(--muted);font-family:'Teko',sans-serif;font-size:1rem;letter-spacing:1px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.nav-btn.active{color:var(--text);border-bottom-color:var(--red);}
.badge{background:var(--red);color:#fff;border-radius:999px;font-size:.62rem;font-weight:600;padding:1px 5px;line-height:1.4;}

#view-nueva{display:none;flex-direction:column;height:calc(100vh - 93px);}
#view-nueva.active{display:flex;}
#view-sent{display:none;padding:12px;overflow-y:auto;height:calc(100vh - 93px);}
#view-sent.active{display:block;}

.nueva-body{display:flex;flex:1;overflow:hidden;}

/* MENU */
.menu-panel{width:52%;border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-title{font-family:'Teko',sans-serif;font-size:.85rem;letter-spacing:2px;color:var(--muted);padding:6px 10px 4px;border-bottom:1px solid var(--border);background:var(--card);}
.menu-scroll{flex:1;overflow-y:auto;}
.cat-section{margin-bottom:1px;}
.cat-header{background:#1e1e1e;padding:5px 10px;font-family:'Teko',sans-serif;font-size:.88rem;letter-spacing:1px;color:var(--yellow);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cat-price{font-size:.72rem;color:var(--green);font-family:'Noto Sans',sans-serif;font-weight:600;}
.cat-items{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px;}
.menu-btn{background:var(--card2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Noto Sans',sans-serif;font-size:.66rem;font-weight:500;padding:7px 5px;cursor:pointer;text-align:center;line-height:1.2;min-height:38px;display:flex;align-items:center;justify-content:center;transition:background .1s,transform .08s;user-select:none;}
.menu-btn:active{transform:scale(.93);background:var(--red);border-color:var(--red);}
.menu-btn.needs-meat{border-left:3px solid var(--orange);}
.menu-btn.full-w{grid-column:span 2;}

/* ORDER PANEL */
.order-panel{width:48%;display:flex;flex-direction:column;overflow:hidden;}
.order-top{padding:6px 10px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.order-top span{font-family:'Teko',sans-serif;font-size:.85rem;letter-spacing:2px;color:var(--muted);}
.order-top strong{font-family:'Teko',sans-serif;font-size:1.1rem;color:var(--yellow);}

/* FOR HERE / TO GO */
.dine-row{display:flex;gap:0;border-bottom:1px solid var(--border);}
.dine-btn{flex:1;padding:7px 4px;background:var(--card2);border:none;color:var(--muted);font-family:'Teko',sans-serif;font-size:.95rem;letter-spacing:1px;cursor:pointer;transition:all .15s;border-right:1px solid var(--border);}
.dine-btn:last-child{border-right:none;}
.dine-btn.active-aqui{background:#1a3a5c;color:#5dade2;font-weight:600;}
.dine-btn.active-llevar{background:#1a3a1a;color:var(--green);font-weight:600;}

.order-items{flex:1;overflow-y:auto;padding:6px;}
.empty-msg{text-align:center;color:var(--muted);padding:20px 8px;font-size:.75rem;line-height:1.8;}

/* REGULAR ITEM */
.order-item{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:5px 6px;margin-bottom:4px;animation:slideIn .15s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(8px);}to{opacity:1;transform:translateX(0);}}
.item-row{display:flex;align-items:center;gap:4px;}
.item-name{flex:1;font-size:.67rem;font-weight:600;line-height:1.2;}
.qty-row{display:flex;align-items:center;gap:3px;}
.qbtn{width:20px;height:20px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:3px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:var(--red);}
.qty-num{font-family:'Teko',sans-serif;font-size:.9rem;min-width:14px;text-align:center;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;padding:1px 3px;}
.del-btn:active{color:var(--red);}
.meat-tag{font-size:.6rem;background:rgba(230,126,34,.15);border:1px solid var(--orange);color:var(--orange);border-radius:3px;padding:1px 4px;margin-top:2px;display:inline-block;}

/* COMBO PLATE */
.combo-plate{background:#161e16;border:2px solid #2d5a2d;border-radius:6px;padding:5px 7px;margin-bottom:5px;animation:slideIn .15s ease;}
.combo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.combo-label{font-family:'Teko',sans-serif;font-size:.85rem;color:var(--green);letter-spacing:1px;}
.combo-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;}
.combo-del:active{color:var(--red);}
.combo-items{padding-left:6px;border-left:2px solid #2d5a2d;}
.combo-item{display:flex;align-items:center;gap:4px;padding:3px 0;font-size:.65rem;border-bottom:1px dashed #1e3a1e;}
.combo-item:last-child{border-bottom:none;}
.combo-item-name{font-weight:600;}
.combo-meat{font-size:.6rem;color:var(--orange);}
.combo-qty-row{display:flex;align-items:center;gap:3px;margin-left:auto;}
.combo-qbtn{width:18px;height:18px;background:var(--card);border:1px solid #2d5a2d;color:var(--green);border-radius:3px;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;line-height:1;}
.combo-qbtn:active{background:#2d5a2d;}
.combo-qty-num{font-family:'Teko',sans-serif;font-size:.85rem;min-width:14px;text-align:center;color:var(--text);}
.btn-add-to-combo{font-size:.6rem;color:var(--green);background:none;border:1px dashed #2d5a2d;border-radius:3px;padding:2px 5px;cursor:pointer;margin-top:3px;width:100%;}

/* COMBO START BUTTON */
.btn-combo{background:#162416;border:1px dashed #2d5a2d;color:var(--green);border-radius:5px;padding:5px;font-size:.68rem;cursor:pointer;text-align:center;margin-bottom:5px;width:100%;}
.btn-combo:active{background:#1e3a1e;}

.notes-row{padding:4px 6px;border-top:1px solid var(--border);}
.notes-row textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Noto Sans',sans-serif;font-size:.68rem;padding:4px;resize:none;height:40px;}
.notes-row textarea::placeholder{color:var(--muted);}
.notes-row textarea:focus{outline:1px solid var(--red);}
.action-row{padding:6px;display:flex;gap:5px;border-top:1px solid var(--border);}
.btn-enviar{flex:1;background:var(--red);color:#fff;border:none;border-radius:5px;padding:10px;font-family:'Teko',sans-serif;font-size:1.1rem;letter-spacing:1px;cursor:pointer;}
.btn-enviar:active{background:var(--red-dark);}
.btn-limpiar{background:var(--card2);color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:10px 10px;font-size:.72rem;cursor:pointer;}

/* SENT */
.sent-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sent-header h2{font-family:'Teko',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--muted);}
.btn-clear-sent{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:4px;cursor:pointer;font-size:.73rem;}
.sent-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:8px;}
.sent-card.listo{border-color:var(--green);opacity:.55;}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.sc-num{font-family:'Teko',sans-serif;font-size:1.2rem;color:var(--yellow);}
.sc-time{font-size:.7rem;color:var(--muted);}
.sc-dine{font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px;}
.sc-dine.aqui{background:#1a3a5c;color:#5dade2;}
.sc-dine.llevar{background:#1a3a1a;color:var(--green);}
.sc-line{font-size:.76rem;padding:2px 0;border-bottom:1px dashed var(--border);display:flex;gap:6px;}
.sc-line:last-child{border:none;}
.sc-qty{font-family:'Teko',sans-serif;color:var(--red);min-width:20px;}
.sc-meat{font-size:.65rem;color:var(--orange);}
.sc-combo-label{font-size:.68rem;color:var(--green);font-weight:700;margin-top:4px;padding:2px 0;}
.sc-status{font-size:.66rem;margin-top:4px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:2px solid var(--border);border-radius:10px;width:92%;max-width:380px;overflow:hidden;}
.modal-head{background:var(--orange);padding:10px 14px;}
.modal-head h3{font-family:'Teko',sans-serif;font-size:1.3rem;letter-spacing:1px;}
.modal-head p{font-size:.72rem;opacity:.85;margin-top:1px;}
.modal-body{padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:50vh;overflow-y:auto;}
.meat-opt-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:9px 6px;font-family:'Noto Sans',sans-serif;font-size:.76rem;font-weight:500;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.meat-opt-btn:active{background:var(--orange);border-color:var(--orange);}
.meat-extra{font-size:.61rem;color:var(--green);font-weight:600;}
.modal-foot{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;}
.btn-sin-carne{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:7px;font-size:.72rem;cursor:pointer;}
.btn-cancelar-modal{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:7px 10px;font-size:.72rem;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#222;border:1px solid var(--green);color:var(--green);border-radius:6px;padding:7px 16px;font-size:.8rem;font-weight:600;z-index:300;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div>
    <h1>🌹 LA ROSA</h1>
    <div style="font-size:.6rem;color:rgba(255,255,255,.7);letter-spacing:1px;margin-top:1px;">TIENDA MEXICANA — TOMAR ORDEN</div>
  </div>
  <div class="hdr-right">
    <span id="num-display">ORDEN #001</span>
    <span id="sync-status">⚪ Sin Firebase</span>
  </div>
</header>

<nav>
  <button class="nav-btn active" id="tab-nueva" onclick="showTab('nueva')">➕ NUEVA ORDEN</button>
  <button class="nav-btn" id="tab-sent" onclick="showTab('sent')">📤 ENVIADAS <span class="badge" id="badge">0</span></button>
</nav>

<div id="view-nueva">
  <div class="nueva-body">
    <!-- MENU -->
    <div class="menu-panel">
      <div class="panel-title">MENÚ — TOCA PARA AGREGAR</div>
      <div class="menu-scroll" id="menu-scroll"></div>
    </div>
    <!-- ORDER -->
    <div class="order-panel">
      <div class="order-top">
        <span>ORDEN ACTUAL</span>
        <strong id="cur-num">#001</strong>
      </div>
      <!-- FOR HERE / TO GO -->
      <div class="dine-row">
        <button class="dine-btn active-aqui" id="btn-aqui" onclick="setDine('aqui')">🍽 PARA AQUÍ</button>
        <button class="dine-btn" id="btn-llevar" onclick="setDine('llevar')">🥡 PARA LLEVAR</button>
      </div>
      <div class="order-items" id="order-items">
        <div class="empty-msg">👈 Toca un platillo<br>para agregarlo</div>
      </div>
      <div class="notes-row">
        <textarea id="notas" placeholder="Notas: sin cebolla, extra salsa..."></textarea>
      </div>
      <div class="action-row">
        <button class="btn-limpiar" onclick="limpiarOrden()">Limpiar</button>
        <button class="btn-enviar" onclick="enviarOrden()">ENVIAR A COCINA</button>
      </div>
    </div>
  </div>
</div>

<div id="view-sent">
  <div class="sent-header">
    <h2>ÓRDENES ENVIADAS</h2>
    <button class="btn-clear-sent" onclick="clearListas()">Limpiar completadas</button>
  </div>
  <div id="sent-list"><div class="empty-msg">No hay órdenes enviadas aún</div></div>
</div>

<!-- MEAT MODAL -->
<div class="modal-overlay" id="meat-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">¿Qué carne?</h3>
      <p id="modal-sub">Selecciona el tipo de carne</p>
    </div>
    <div class="modal-body" id="meat-options"></div>
    <div class="modal-foot">
      <button class="btn-sin-carne" onclick="elegirCarne(null)">Sin especificar</button>
      <button class="btn-cancelar-modal" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  MENU DATA
// ══════════════════════════════════════════════════
var CATEGORIAS = [
  {
    label:"TACOS", price:"$3.99",
    carnes:[{name:"Asada"},{name:"Barbacoa"},{name:"Adobada"},{name:"Pollo"},{name:"Al Pastor"},{name:"Carnitas"},{name:"Chorizo"},{name:"Chicharron en Salsa"},{name:"Lengua"},{name:"Tripa"}],
    items:[{name:"Tacos",needsMeat:true,combo:true}]
  },
  {
    label:"BURRITOS Y QUESADILLAS", price:"$12.99",
    carnes:[{name:"Asada"},{name:"Barbacoa"},{name:"Adobada"},{name:"Pollo"},{name:"Al Pastor"},{name:"Carnitas"},{name:"Chorizo"},{name:"Lengua"},{name:"Tripa"}],
    items:[
      {name:"Burrito",needsMeat:true},{name:"Quesadilla",needsMeat:true},
      {name:"Burrito Mixto",needsMeat:true},{name:"Burrito Lengua/Tripa",needsMeat:false},
      {name:"Quesadilla Lengua/Tripa",needsMeat:false},{name:"Quesataco",needsMeat:true},
      {name:"Quesabirrias",needsMeat:false}
    ]
  },
  {
    label:"SOPES Y GORDITAS", price:"$4.29",
    carnes:[{name:"Asada"},{name:"Barbacoa"},{name:"Adobada"},{name:"Pollo"},{name:"Al Pastor"},{name:"Carnitas"},{name:"Chorizo"},{name:"Chicharron en Salsa"},{name:"Lengua"},{name:"Tripa"}],
    items:[
      {name:"Sopes",needsMeat:true,combo:true},
      {name:"Gorditas",needsMeat:true,combo:true},
      {name:"Gordita Lengua/Tripa",needsMeat:false},
      {name:"Tostada",needsMeat:true,combo:true}
    ]
  },
  {
    label:"TORTAS", price:"$12.99",
    carnes:[{name:"Asada"},{name:"Barbacoa"},{name:"Adobada"},{name:"Pollo"},{name:"Al Pastor"},{name:"Carnitas"},{name:"Chorizo"},{name:"Lengua"},{name:"Tripa"},{name:"Cubana"},{name:"Milanesa Res/Pollo"}],
    items:[
      {name:"Torta",needsMeat:true},
      {name:"Torta Cubana",needsMeat:false},
      {name:"Torta Milanesa Res",needsMeat:false},
      {name:"Torta Milanesa Pollo",needsMeat:false},
      {name:"Torta Lengua/Tripa",needsMeat:false}
    ]
  },
  {
    label:"PLATILLOS", price:"", carnes:null,
    items:[
      {name:"Platillo Carne Asada",needsMeat:false},{name:"Platillo Pollo Plancha",needsMeat:false},
      {name:"Platillo Costilla Asada",needsMeat:false},{name:"Platillo Mojarra",needsMeat:false},
      {name:"Platillo Milanesa Pollo",needsMeat:false},{name:"Platillo Milanesa Res",needsMeat:false},
      {name:"Platillo Bistec Ranchero",needsMeat:false},{name:"Platillo Huevos Rancheros",needsMeat:false},
      {name:"Platillo Nopales con Huevo",needsMeat:false},{name:"Platillo Mole",needsMeat:false},
      {name:"Platillo Chile Relleno",needsMeat:false},{name:"Platillo Empanadas Pollo",needsMeat:false},
      {name:"Platillo Costilla Verde",needsMeat:false},{name:"Platillo Costilla Roja",needsMeat:false}
    ]
  },
  {
    label:"CALDOS", price:"$13.99", carnes:null,
    items:[
      {name:"Caldo de Res",needsMeat:false},{name:"Caldo de Pollo",needsMeat:false},
      {name:"Menudo",needsMeat:false},{name:"Pozole",needsMeat:false},{name:"Medio Caldo",needsMeat:false}
    ]
  },
  {
    label:"EXTRAS", price:"", carnes:null,
    items:[
      {name:"Arroz",needsMeat:false},{name:"Frijoles",needsMeat:false},
      {name:"Empanada",needsMeat:false},{name:"Ensalada",needsMeat:false},{name:"Nachos",needsMeat:false},
      {name:"Nopales en vinagre",needsMeat:false},{name:"Side papas fritas",needsMeat:false},
      {name:"Side platano frito",needsMeat:false},{name:"Orden tortilla",needsMeat:false},
      {name:"Orden cebolla/cilantro",needsMeat:false},{name:"Salsa roja",needsMeat:false},
      {name:"Salsa verde",needsMeat:false},{name:"Atole/arroz con leche",needsMeat:false},
      {name:"Dulce preparado",needsMeat:false},{name:"Consome de res",needsMeat:false},
      {name:"Vaso costilla verde/roja",needsMeat:false},{name:"Tripa cocinada",needsMeat:false},
      {name:"Lengua conocida",needsMeat:false},{name:"Carne cocinada",needsMeat:false}
    ]
  }
];

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
var ordenActual = [];   // each entry: {type:'item'|'combo', ...}
var numOrden = 1;
var sentOrders = [];
var pendingItem = null;
var pendingComboIdx = null; // if adding to existing combo
var dineOption = 'aqui';   // 'aqui' or 'llevar'
var fbPush = null;
var fbDelete = null;

// ══════════════════════════════════════════════════
//  DINE OPTION
// ══════════════════════════════════════════════════
function setDine(opt) {
  dineOption = opt;
  document.getElementById('btn-aqui').className   = 'dine-btn' + (opt==='aqui'  ? ' active-aqui'   : '');
  document.getElementById('btn-llevar').className = 'dine-btn' + (opt==='llevar' ? ' active-llevar' : '');
}

// ══════════════════════════════════════════════════
//  BUILD MENU
// ══════════════════════════════════════════════════
(function buildMenu() {
  var scroll = document.getElementById('menu-scroll');
  CATEGORIAS.forEach(function(cat) {
    var sec = document.createElement('div'); sec.className = 'cat-section';
    var hdr = document.createElement('div'); hdr.className = 'cat-header';
    hdr.innerHTML = cat.label;
    sec.appendChild(hdr);
    var grid = document.createElement('div'); grid.className = 'cat-items';
    cat.items.forEach(function(item) {
      var btn = document.createElement('button');
      btn.className = 'menu-btn'+(item.needsMeat?' needs-meat':'')+(cat.items.length===1?' full-w':'');
      btn.textContent = item.name;
      (function(iName, iNeedsMeat, iCarnes, iCatLabel) {
        btn.onclick = function() {
          if (iNeedsMeat && iCarnes) abrirModal(iName, iCarnes, iCatLabel, null);
          else agregarItem(iName, null, null);
        };
      })(item.name, item.needsMeat, cat.carnes, cat.label);
      grid.appendChild(btn);
    });
    sec.appendChild(grid); scroll.appendChild(sec);
  });
})();

// ══════════════════════════════════════════════════
//  ADD ITEM (regular or into combo)
// ══════════════════════════════════════════════════
function agregarItem(nombre, carne, comboIdx) {
  if (comboIdx !== null && comboIdx !== undefined) {
    // Check if same item+carne already in combo — if so increase qty
    var found = null;
    for (var x=0; x<ordenActual[comboIdx].items.length; x++) {
      if (ordenActual[comboIdx].items[x].nombre===nombre && ordenActual[comboIdx].items[x].carne===carne) {
        found = ordenActual[comboIdx].items[x]; break;
      }
    }
    if (found) found.qty = (found.qty||1) + 1;
    else ordenActual[comboIdx].items.push({nombre:nombre, carne:carne, qty:1});
  } else {
    // Regular item — merge same name+carne
    var ex = null;
    for (var i=0; i<ordenActual.length; i++) {
      if (ordenActual[i].type==='item' && ordenActual[i].nombre===nombre && ordenActual[i].carne===carne) { ex=ordenActual[i]; break; }
    }
    if (ex) ex.qty++;
    else ordenActual.push({type:'item', nombre:nombre, carne:carne, qty:1});
  }
  renderOrden();
}

// ══════════════════════════════════════════════════
//  COMBO PLATE
// ══════════════════════════════════════════════════
function crearCombo() {
  ordenActual.push({type:'combo', items:[], label:'PLATO COMBINADO'});
  renderOrden();
  showToast('🍽 Plato combinado creado — agrega los items');
}

function addToCombo(comboIdx) {
  // Open menu modal for next item — store which combo to add to
  pendingComboIdx = comboIdx;
  showToast('👈 Ahora toca el platillo a agregar al plato');
  // Temporarily override menu buttons to target combo
  activateComboMode(comboIdx);
}

var comboModeActive = false;
var comboModeIdx = null;

function activateComboMode(idx) {
  comboModeActive = true;
  comboModeIdx = idx;
  // Highlight panel title
  document.querySelector('.panel-title').textContent = '🍽 TOCA PARA AGREGAR AL PLATO';
  document.querySelector('.panel-title').style.color = '#2ecc71';
}

function deactivateComboMode() {
  comboModeActive = false;
  comboModeIdx = null;
  document.querySelector('.panel-title').textContent = 'MENÚ — TOCA PARA AGREGAR';
  document.querySelector('.panel-title').style.color = '';
}

// Override menu click when in combo mode
var origBuildDone = true;
document.addEventListener('click', function(e) {
  if (!comboModeActive) return;
  var btn = e.target.closest('.menu-btn');
  if (!btn) return;
  // Already handled by btn.onclick — we intercept via pendingComboIdx in modal
});

function eliminarCombo(idx) {
  ordenActual.splice(idx, 1);
  renderOrden();
}

function eliminarItemDeCombo(comboIdx, itemIdx) {
  ordenActual[comboIdx].items.splice(itemIdx, 1);
  renderOrden();
}

function cambiarQtyCombo(comboIdx, itemIdx, delta) {
  var item = ordenActual[comboIdx].items[itemIdx];
  item.qty = (item.qty || 1) + delta;
  if (item.qty <= 0) ordenActual[comboIdx].items.splice(itemIdx, 1);
  renderOrden();
}

// ══════════════════════════════════════════════════
//  RENDER ORDER
// ══════════════════════════════════════════════════
function renderOrden() {
  var el = document.getElementById('order-items');

  // Always show combo button at top
  var html = '<button class="btn-combo" onclick="crearCombo()">🍽 + Crear Plato Combinado</button>';

  if (!ordenActual.length) {
    html += '<div class="empty-msg">👈 Toca un platillo<br>para agregarlo</div>';
    el.innerHTML = html;
    return;
  }

  ordenActual.forEach(function(entry, i) {
    if (entry.type === 'combo') {
      html += '<div class="combo-plate">' +
        '<div class="combo-header">' +
          '<span class="combo-label">🍽 PLATO COMBINADO</span>' +
          '<button class="combo-del" onclick="eliminarCombo('+i+')">✕ eliminar plato</button>' +
        '</div>' +
        '<div class="combo-items">';
      if (!entry.items.length) {
        html += '<div style="font-size:.62rem;color:var(--muted);padding:4px 0;">Vacío — toca "+ Agregar item"</div>';
      }
      entry.items.forEach(function(it, j) {
        var qty = it.qty || 1;
        html += '<div class="combo-item">' +
          '<div style="flex:1;">' +
            '<span class="combo-item-name">' + it.nombre + '</span>' +
            (it.carne ? '<span class="combo-meat"> 🥩 '+it.carne+'</span>' : '') +
          '</div>' +
          '<div class="combo-qty-row">' +
            '<button class="combo-qbtn" onclick="cambiarQtyCombo('+i+','+j+',-1)">−</button>' +
            '<span class="combo-qty-num">'+qty+'</span>' +
            '<button class="combo-qbtn" onclick="cambiarQtyCombo('+i+','+j+',1)">+</button>' +
          '</div>' +
          '<button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:0 2px;" onclick="eliminarItemDeCombo('+i+','+j+')">✕</button>' +
        '</div>';
      });
      html += '</div>' +
        '<button class="btn-add-to-combo" onclick="addToCombo('+i+')">+ Agregar item al plato</button>' +
      '</div>';
    } else {
      html += '<div class="order-item">' +
        '<div class="item-row">' +
          '<div class="item-name">' + entry.nombre + '</div>' +
          '<div class="qty-row">' +
            '<button class="qbtn" onclick="cambiarQty('+i+',-1)">−</button>' +
            '<span class="qty-num">' + entry.qty + '</span>' +
            '<button class="qbtn" onclick="cambiarQty('+i+',1)">+</button>' +
          '</div>' +
          '<button class="del-btn" onclick="eliminarItem('+i+')">✕</button>' +
        '</div>' +
        (entry.carne ? '<span class="meat-tag">🥩 '+entry.carne+'</span>' : '') +
      '</div>';
    }
  });
  el.innerHTML = html;
}

function cambiarQty(i, d) {
  if (ordenActual[i].type==='item') {
    ordenActual[i].qty += d;
    if (ordenActual[i].qty <= 0) ordenActual.splice(i,1);
  }
  renderOrden();
}
function eliminarItem(i) { ordenActual.splice(i,1); renderOrden(); }
function limpiarOrden() { ordenActual=[]; document.getElementById('notas').value=''; setDine('aqui'); renderOrden(); }

// ══════════════════════════════════════════════════
//  SEND ORDER
// ══════════════════════════════════════════════════
function enviarOrden() {
  if (!ordenActual.length) { alert('Agrega platillos primero.'); return; }
  var notas = document.getElementById('notas').value.trim();
  var num = String(numOrden).padStart(3,'0');
  var now = new Date();
  var orden = {
    num: '#'+num, numInt: numOrden,
    items: JSON.parse(JSON.stringify(ordenActual)),
    notas: notas,
    dine: dineOption,
    hora: now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}),
    fecha: now.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'}),
    timestamp: now.getTime(),
    listo: false
  };

  if (fbPush) {
    try {
      fbPush(orden, function(err, key) {
        if (err) setSyncStatus('⚠️ Error','#e74c3c');
        else { orden.fbKey = key; setSyncStatus('🟢 Enviado','#2ecc71'); }
      });
    } catch(e) { setSyncStatus('⚠️ Sin conexión','#e67e22'); }
  }

  sentOrders.unshift(JSON.parse(JSON.stringify(orden)));
  numOrden++;
  var n = '#'+String(numOrden).padStart(3,'0');
  document.getElementById('num-display').textContent = 'ORDEN '+n;
  document.getElementById('cur-num').textContent = n;
  limpiarOrden();
  actualizarBadge(); renderSent();
  showToast('✅ Orden '+orden.num+' enviada a cocina');
  showTab('sent');
}

// ══════════════════════════════════════════════════
//  RENDER SENT
// ══════════════════════════════════════════════════
function renderSent() {
  var el = document.getElementById('sent-list');
  if (!sentOrders.length) { el.innerHTML='<div class="empty-msg">No hay órdenes enviadas aún</div>'; return; }
  var html = '';
  sentOrders.forEach(function(o) {
    var dineLabel = o.dine==='llevar'
      ? '<span class="sc-dine llevar">🥡 PARA LLEVAR</span>'
      : '<span class="sc-dine aqui">🍽 PARA AQUÍ</span>';
    html += '<div class="sent-card'+(o.listo?' listo':'') + '">' +
      '<div class="sc-head"><span class="sc-num">'+o.num+dineLabel+'</span><span class="sc-time">'+o.hora+'</span></div>';

    o.items.forEach(function(entry) {
      if (entry.type==='combo') {
        html += '<div class="sc-combo-label">🍽 PLATO COMBINADO:</div>';
        entry.items.forEach(function(it) {
          var q = it.qty||1;
          html += '<div class="sc-line" style="padding-left:8px;border-left:2px solid #2d5a2d;">' +
            '<span class="sc-qty">'+q+'×</span>' +
            '<span>'+it.nombre+(it.carne?'<span class="sc-meat"> — 🥩'+it.carne+'</span>':'')+'</span></div>';
        });
      } else {
        html += '<div class="sc-line"><span class="sc-qty">'+entry.qty+'×</span>' +
          '<span>'+entry.nombre+(entry.carne?'<span class="sc-meat"> — 🥩'+entry.carne+'</span>':'')+'</span></div>';
      }
    });

    if (o.notas) html += '<div style="font-size:.68rem;color:var(--yellow);margin-top:4px;">📝 '+o.notas+'</div>';
    html += '<div class="sc-status" style="color:'+(o.listo?'var(--green)':'var(--muted)')+'">'+
      (o.listo?'✓ LISTA':'⏳ En espera...')+'</div></div>';
  });
  el.innerHTML = html;
}

function clearListas() { sentOrders=sentOrders.filter(function(o){return !o.listo;}); actualizarBadge(); renderSent(); }
function actualizarBadge() { document.getElementById('badge').textContent=sentOrders.filter(function(o){return !o.listo;}).length; }

// ══════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════
function abrirModal(itemName, carnes, catLabel, comboIdx) {
  pendingItem = {nombre:itemName, comboIdx:comboIdx};
  document.getElementById('modal-title').textContent = itemName;
  document.getElementById('modal-sub').textContent = catLabel + ' — ¿Qué tipo de carne?';
  var html = '';
  carnes.forEach(function(c) {
    html += '<button class="meat-opt-btn" onclick="elegirCarne(\''+c.name.replace(/'/g,"\\'")+'\')">' +
      c.name+(c.extra?'<span class="meat-extra">'+c.extra+'</span>':'')+'</button>';
  });
  document.getElementById('meat-options').innerHTML = html;
  document.getElementById('meat-modal').classList.add('open');
}

function elegirCarne(carne) {
  if (pendingItem) {
    if (comboModeActive) {
      agregarItem(pendingItem.nombre, carne, comboModeIdx);
      deactivateComboMode();
    } else {
      agregarItem(pendingItem.nombre, carne, pendingItem.comboIdx);
    }
  }
  cerrarModal();
}

function cerrarModal() {
  document.getElementById('meat-modal').classList.remove('open');
  pendingItem = null;
  if (comboModeActive) deactivateComboMode();
}
document.getElementById('meat-modal').addEventListener('click', function(e){ if(e.target===this) cerrarModal(); });

// Intercept menu clicks when in combo mode
document.getElementById('menu-scroll').addEventListener('click', function(e) {
  if (!comboModeActive) return;
  var btn = e.target.closest('.menu-btn');
  if (!btn) return;
  e.stopImmediatePropagation();
  // Find item data from button text
  var btnText = btn.textContent.trim();
  var foundCat = null; var foundItem = null;
  for (var c=0; c<CATEGORIAS.length; c++) {
    for (var it=0; it<CATEGORIAS[c].items.length; it++) {
      if (CATEGORIAS[c].items[it].name === btnText) {
        foundCat = CATEGORIAS[c]; foundItem = CATEGORIAS[c].items[it]; break;
      }
    }
    if (foundItem) break;
  }
  if (!foundItem) return;
  if (foundItem.needsMeat && foundCat.carnes) {
    abrirModal(foundItem.name, foundCat.carnes, foundCat.label, comboModeIdx);
  } else {
    agregarItem(foundItem.name, null, comboModeIdx);
    deactivateComboMode();
  }
}, true);

// ══════════════════════════════════════════════════
//  TABS & TOAST
// ══════════════════════════════════════════════════
function showTab(tab) {
  var vn=document.getElementById('view-nueva'), vs=document.getElementById('view-sent');
  var tn=document.getElementById('tab-nueva'),  ts=document.getElementById('tab-sent');
  if (tab==='nueva') { vn.style.display='flex'; vs.style.display='none'; tn.classList.add('active'); ts.classList.remove('active'); }
  else { vn.style.display='none'; vs.style.display='block'; tn.classList.remove('active'); ts.classList.add('active'); renderSent(); }
}
function showToast(msg) {
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2800);
}
function setSyncStatus(msg,color) {
  var el=document.getElementById('sync-status'); el.textContent=msg; el.style.color=color;
}
